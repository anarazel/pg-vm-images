name: build PG CI Downloads

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-mingw:
    runs-on: windows-2022

    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: UCRT64
          update: true
          location: ${{github.workspace}}
          install: >-
            bison flex
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-icu
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-libxslt
            mingw-w64-ucrt-x86_64-lz4
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-perl
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-readline
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-zstd

      - name: Minimize
        shell: msys2 {0}
        run: |
          du -sh msys64
          find msys64/{usr,ucrt64}/share/{man,doc} -type f -exec rm '{}' +
          du -sh msys64
          find msys64/ucrt64/lib -name '*.a' -and -not -name '*.dll.a'|less
          du -sh msys64

          find "msys64/ucrt64/lib" -type f -name '*.dll.a' -print0 |
          while IFS= read -r -d '' dll_a; do
            base="${dll_a%.dll.a}"
            a_file="${base}.a"

            if [[ -f "$a_file" ]]; then
              rm -f -- "$a_file"
              printf 'Removed: %s\n' "$a_file"
            fi
          done
          du -sh msys64

      - name: Compress
        shell: msys2 {0}
        run: |
           tar -cf - msys64 | zstd -f -T0 -15 - -o msys64.tar.zst

      - name: Upload msys64.tar.zst
        uses: actions/upload-artifact@v7
        with:
          name: msys64.tar.zst
          path: msys64.tar.zst
          if-no-files-found: error
          archive: false
